<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工具导航</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #2c3e50;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header h1 i {
            color: #667eea;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            text-decoration: none;
            color: #2c3e50;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .nav-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
            border-color: #667eea;
        }

        .nav-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            flex-shrink: 0;
        }

        .nav-icon.tomato {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .nav-icon.homework {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        }

        .nav-icon.viewer {
            background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
        }

        .nav-content {
            flex: 1;
        }

        .nav-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .nav-desc {
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .nav-arrow {
            font-size: 1.2rem;
            color: #7f8c8d;
            transition: all 0.3s ease;
        }

        .nav-item:hover .nav-arrow {
            color: #667eea;
            transform: translateX(5px);
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #7f8c8d;
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .card {
                padding: 24px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .nav-item {
                padding: 16px;
            }

            .nav-icon {
                width: 44px;
                height: 44px;
                font-size: 1.3rem;
            }

            .nav-title {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1><i class="fas fa-th-large"></i> 工具导航</h1>
            </div>

            <div class="nav-list">
                <a href="tomato.html" class="nav-item">
                    <div class="nav-icon tomato">
                        <i class="fas fa-tomato"></i>
                    </div>
                    <div class="nav-content">
                        <div class="nav-title">番茄钟</div>
                        <div class="nav-desc">学习专注计时器</div>
                    </div>
                    <div class="nav-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>

                <a href="op.html" class="nav-item">
                    <div class="nav-icon homework">
                        <i class="fas fa-book"></i>
                    </div>
                    <div class="nav-content">
                        <div class="nav-title">作业登记本</div>
                        <div class="nav-desc">手机作业登记与管理</div>
                    </div>
                    <div class="nav-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>

                <a href="user.html" class="nav-item">
                    <div class="nav-icon viewer">
                        <i class="fas fa-clipboard-list"></i>
                    </div>
                    <div class="nav-content">
                        <div class="nav-title">作业查看</div>
                        <div class="nav-desc">查看学生作业</div>
                    </div>
                    <div class="nav-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>
            </div>

            <div class="footer">
                <p>作业管理系统</p>
            </div>
        </div>
    </div>
</body>
</html>
